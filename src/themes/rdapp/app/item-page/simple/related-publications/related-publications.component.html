@if (relatedItems$ | async; as items) {
  @if (items.length > 0) {
    <section class="ds-related-publications" aria-labelledby="related-publications-title">

      <div class="d-flex align-items-center gap-2 mb-3">
        <i class="fas fa-tags ds-related-publications__icon" aria-hidden="true"></i>
        <h2 class="h5 fw-bold mb-0 ds-related-publications__title" id="related-publications-title">
          {{ 'rdapp.item.related.title' | translate }}
        </h2>
      </div>

      <div class="position-relative">

        <button class="ds-related-carousel__btn ds-related-carousel__btn--prev btn btn-light"
                type="button"
                (click)="scrollPrev()"
                aria-label="Anterior">
          <i class="fas fa-chevron-left" aria-hidden="true"></i>
        </button>

        <div class="ds-related-carousel" #carousel>
          @for (related of items; track related.uuid) {
            <a class="card text-decoration-none text-reset ds-related-card"
               [routerLink]="getRoute(related)"
               [attr.aria-label]="('rdapp.item.related.access' | translate) + ' ' + related.name">

              <div class="ds-related-card__cover">
                <ds-thumbnail
                  [thumbnail]="related.thumbnail | async"
                  [limitWidth]="false"
                  [defaultImage]="'assets/dspace/images/file-placeholder.png'">
                </ds-thumbnail>
              </div>

              <div class="card-body d-flex flex-column gap-2">
                <p class="small fw-semibold mb-0 ds-related-card__title">{{ related.name }}</p>
                <div class="d-flex justify-content-between align-items-center mt-auto">
                  <span class="text-muted small">{{ getYear(related) }}</span>
                  <span class="ds-related-card__access small fw-bold">
                    {{ 'rdapp.item.related.access' | translate }}
                    <i class="fas fa-arrow-right ms-1" aria-hidden="true"></i>
                  </span>
                </div>
              </div>

            </a>
          }
        </div>

        <button class="ds-related-carousel__btn ds-related-carousel__btn--next btn btn-light"
                type="button"
                (click)="scrollNext()"
                aria-label="Próximo">
          <i class="fas fa-chevron-right" aria-hidden="true"></i>
        </button>

      </div>

    </section>
  }
}
