<ds-home-coar></ds-home-coar>
<ds-home-news></ds-home-news>
<div class="container">
  <div class="row">
    <div class="col-12">
      <ds-search-form [inPlaceSearch]="false" [searchPlaceholder]="'home.search-form.placeholder' | translate">
      </ds-search-form>
    </div>
  </div>
</div>
<ng-template #homeContent>
  <div class="d-flex flex-column align-items-center justify-content-center text-center w-100 home-explore-area">
    <div class="rounded-circle d-flex align-items-center justify-content-center mb-4 home-explore-icon-wrap">
      <i class="fas fa-search fa-2x home-explore-icon"></i>
    </div>
    <h2 class="fw-bold mb-2 home-explore-title">
      {{ 'rdapp.search.placeholder.title' | translate }}
    </h2>
    <p class="text-muted mb-0 home-explore-subtitle">
      {{ 'rdapp.search.placeholder.subtitle' | translate }}
    </p>
  </div>
</ng-template>
@if (showDiscoverFilters) {
<ds-configuration-search-page [sideBarWidth]="3" [showViewModes]="false" [searchEnabled]="false" [inPlaceSearch]="false"
  [showScopeSelector]="false">
  <ng-container searchContentTop *ngTemplateOutlet="homeContent"></ng-container>
</ds-configuration-search-page>
}
@if (!showDiscoverFilters) {
<div class="container">
  <ng-container *ngTemplateOutlet="homeContent"></ng-container>
</div>
}
<ds-suggestions-popup></ds-suggestions-popup>
