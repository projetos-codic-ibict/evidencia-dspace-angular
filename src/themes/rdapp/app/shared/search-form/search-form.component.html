<form #form="ngForm" (ngSubmit)="onSubmit(form.value)" action="/search">
  <div>
    <div class="mb-1 input-group">
      @if (showScopeSelector) {
        <button class="scope-button btn btn-outline-secondary text-truncate d-none d-lg-flex"
          [ngbTooltip]="dsoNameService.getName(selectedScope | async)" type="button"
          (click)="openScopeModal()" role="button" tabindex="0">
          {{dsoNameService.getName(selectedScope | async) || ('search.form.scope.all' | translate)}}
        </button>
      }
      <span class="input-group-text">
        <i class="fas fa-search" aria-hidden="true"></i>
      </span>
      <input type="text" [(ngModel)]="query" name="query" class="form-control"
        [attr.aria-label]="searchPlaceholder" [attr.data-test]="'search-box' | dsBrowserOnly"
        [placeholder]="searchPlaceholder" tabindex="0">
      <button type="submit" class="search-button btn btn-{{brandColor}}" [attr.data-test]="'search-button' | dsBrowserOnly" role="button" tabindex="0">
        {{ 'search.form.search' | translate }}
      </button>
    </div>
    @if (showScopeSelector) {
      <div class="scope-pill-mobile d-flex d-lg-none align-items-center gap-2 mt-2 mb-3 ps-1">
        <span class="text-muted small">{{ 'search.form.scope.searching-in' | translate }}:</span>
        <button type="button" class="scope-pill-mobile__btn" (click)="openScopeModal()" tabindex="0">
          {{ dsoNameService.getName(selectedScope | async) || ('search.form.scope.all' | translate) }}
          <i class="fas fa-chevron-down ms-1" aria-hidden="true"></i>
        </button>
      </div>
    }
  </div>
</form>
